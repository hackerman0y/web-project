<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Skill Details</title>
    <link rel="stylesheet" href="style.css">

    <style>
        .details-container {
            max-width: 850px;
            margin: 60px auto;
            padding: 20px;
        }

        .details-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 32px;
            box-shadow: var(--shadow-md);
            text-align: center;
            position: relative;
        }

        .details-card h2 {
            margin-bottom: 12px;
            font-size: 1.6rem;
        }

        .meta {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .category {
            background: var(--bg);
            border: 1px solid var(--border);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .type-badge {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            color: white;
        }



        .description {
            margin: 14px 0;
            color: var(--text-light);
            line-height: 1.7;
        }

        .popularity {
            margin-top: 10px;
            font-size: 0.9rem;
        }

        .actions {
            margin-top: 22px;
            display: flex;
            justify-content: center;
        }

        .like-btn {
            padding: 10px 28px;
            border-radius: 30px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            color: white;
            background: linear-gradient(135deg, #ff4d6d, #ff758f);
            transition: 0.2s;
            position: relative;
        }

        .like-btn:hover {
            transform: scale(0.95);
            opacity: 0.9;
        }

        .user-info-detail {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-top: 28px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }

        .detail-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: white;
            font-size: 1.1rem;
        }

        .online-status {
            font-size: 0.8rem;
            color: var(--text-light);
        }
    </style>
</head>
<body>

<nav class="navbar">
    <h2 onclick="navigate('index.html')">🔄 SkillSwap</h2>

    <div class="nav-right">
        <a href="index.html" style="text-decoration:none" title="Home">
            <button>🏠</button>
        </a>

        <button onclick="navigate('profile.html')">Profile</button>

        <button class="mode-btn" id="modeBtn" onclick="toggleMode()">🌙</button>
    </div>
</nav>

<div class="details-container">
    <div class="details-card" id="details">Loading...</div>
</div>

<footer>
    <p>
        © 2026 SkillSwap — Learn & Teach Skills Easily 🚀 |
        <a href="about.html">About</a> |
        <a href="contact.html">Contact</a>
    </p>
</footer>

<script>
    const API = "http://localhost:8080";


    function navigate(url) {
        sessionStorage.setItem('navigating', 'true');
        location.href = url;
    }

    // ── Dark mode ──
    const modeBtn = document.getElementById("modeBtn");
    if (localStorage.getItem("mode") === "dark") {
        document.body.classList.add("dark");
        modeBtn.innerText = "☀️";
    }
    function toggleMode() {
        document.body.classList.toggle("dark");
        const dark = document.body.classList.contains("dark");
        localStorage.setItem("mode", dark ? "dark" : "light");
        modeBtn.innerText = dark ? "☀️" : "🌙";
    }

    const params = new URLSearchParams(window.location.search);
    const id     = params.get("id");

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m =>
            m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;'
        );
    }

    function authHeaders() {
        const token = localStorage.getItem("token");
        return {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${token}`
        };
    }


    const container = document.getElementById("details");

    if (!id) {
        container.innerHTML = "<h3>Invalid skill</h3>";
    } else {
        fetch(`${API}/api/skills/${id}`)
            .then(res => {
                if (!res.ok) throw new Error();
                return res.json();
            })
            .then(skill => {
                const user = skill.user || {};

                // ── FIX 8: Only ONE like button here, no duplicate ──
                container.innerHTML = `
                    <h2>${escapeHtml(skill.name)}</h2>
                    <div class="meta">
                        <span class="category">${escapeHtml(skill.category)}</span>
                        <span class="type-badge ${skill.type === 'teach' ? 'type-teach' : 'type-learn'}">
                            ${skill.type === 'teach' ? 'TEACH' : 'LEARN'}
                        </span>
                    </div>

                    <p class="description">
                        ${escapeHtml(skill.description || "No description provided.")}
                    </p>

                    <div class="popularity">
                        🔥 Popularity: <span id="popCount">${skill.popularity || 0}</span>
                    </div>

                  <div class="actions">
    <button class="like-btn" onclick="likeSkill(${skill.id})">❤️ Like </button>
                </div>

                    <div class="user-info-detail">
                        <div class="detail-avatar">
                            ${(user.username?.charAt(0) || "U").toUpperCase()}
                        </div>
                        <div>
                            <div><b>${escapeHtml(user.username || "Unknown")}</b></div>
                            <div class="online-status">
                                ${user.online ? '🟢 Online' : '⚫ Offline'}
                            </div>
                        </div>
                    </div>
                `;
            })
            .catch(() => {
                container.innerHTML = "<h3>Skill not found</h3>";
            });
    }

    async function likeSkill(skillId) {
        const token = localStorage.getItem("token");
        if (!token) {
            alert("Please login to like!");
            navigate('login.html');
            return;
        }
        try {
            const res = await fetch(`${API}/api/skills/${skillId}/increase`, {
                method: "PUT",
                headers: authHeaders()
            });
            if (res.ok) {
                const updated = await res.json();
                const popEl = document.getElementById("popCount");
                if (popEl) popEl.textContent = updated.popularity || 0;
            }
        } catch (e) {
            console.error("Like failed", e);
        }
    }

    // ── Cleanup ──
    window.addEventListener('beforeunload', () => {
        const userId    = localStorage.getItem('userId');
        const navigating = sessionStorage.getItem('navigating');
        if (userId && !navigating) {
            navigator.sendBeacon(`${API}/presence/offline/${userId}`);
        }
        sessionStorage.removeItem('navigating');
    });
</script>
<script src="main.js"></script>
</body>
</html>
