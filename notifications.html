<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SkillSwap - Notifications</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .notif-page-wrapper {
            max-width: 680px;
            margin: 0 auto;
            padding: 20px 16px;
        }

        .notif-page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .notif-page-header h3 { color: var(--primary); }

        .mark-all-btn {
            background: transparent;
            border: 1.5px solid var(--primary);
            color: var(--primary);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            cursor: pointer;
        }

        .notif-list { display: flex; flex-direction: column; gap: 10px; }

        .notif-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px 18px;
            display: flex;
            align-items: flex-start;
            gap: 14px;
            cursor: pointer;
            transition: background 0.15s;
            position: relative;
        }
        .notif-card:hover { background: var(--bg); }
        .notif-card.unread { border-left: 3px solid var(--primary); }

        .notif-icon {
            font-size: 1.4rem;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .notif-body { flex: 1; }

        .notif-title {
            font-weight: 600;
            font-size: 0.88rem;
            margin-bottom: 4px;
            color: var(--text);
        }

        .notif-text {
            font-size: 0.8rem;
            color: var(--text-light);
            line-height: 1.4;
        }

        .notif-time {
            font-size: 0.72rem;
            color: var(--text-light);
            margin-top: 6px;
        }

        .unread-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--primary);
            flex-shrink: 0;
            margin-top: 6px;
        }

        .empty-notif {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-light);
        }
        .empty-notif span { font-size: 2.5rem; display: block; margin-bottom: 10px; }

        .notif-loading {
            text-align: center;
            padding: 40px;
            color: var(--text-light);
        }



        .bell-wrapper { position: relative; display: inline-block; }

        .bell-btn {
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
            padding: 6px 12px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            position: relative;
        }

        .bell-badge {
            position: absolute;
            top: -6px;
            right: -6px;
            background: var(--danger);
            color: white;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            font-size: 0.65rem;
            font-weight: bold;
            display: flex !important;
            align-items: center;
            justify-content: center;
        }

        .bell-dropdown {
            display: none;
            position: absolute;
            right: 0;
            top: calc(100% + 8px);
            width: 300px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
            z-index: 999;
            overflow: hidden;
        }
        .bell-dropdown.open { display: block; }

        .bell-dropdown-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
        }

        .bell-notif-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 10px 16px;
            border-bottom: 1px solid var(--border);
            font-size: 0.8rem;
            cursor: pointer;
            transition: background 0.1s;
        }
        .bell-notif-item:last-child { border-bottom: none; }
        .bell-notif-item:hover { background: var(--bg); }
        .bell-notif-item.unread { font-weight: 600; }
        .bell-notif-msg { flex: 1; color: var(--text); line-height: 1.4; }
        .bell-notif-time { color: var(--text-light); font-size: 0.7rem; white-space: nowrap; }
    </style>
</head>
<body>

<div class="navbar">
    <h2 onclick="navigate('index.html')">SkillSwap</h2>
    <div class="nav-right">


        <div class="bell-wrapper" id="bellWrapper">
            <button class="bell-btn" onclick="toggleBellDropdown()">
                🔔
                <span class="bell-badge" id="bellBadge"></span>
            </button>
            <div class="bell-dropdown" id="bellDropdown">
                <div class="bell-dropdown-header">
                    <span style="font-weight:600; font-size:0.88rem;">Notifications</span>
                    <a href="notifications.html" style="font-size:0.75rem; color:var(--primary); text-decoration:none;">See all</a>
                </div>
                <div id="bellNotifList">
                    <div style="padding:20px; text-align:center; color:var(--text-light); font-size:0.8rem;">Loading...</div>
                </div>
            </div>
        </div>


        <button class="mode-btn" id="modeBtn" onclick="toggleMode()">🌙</button>
        <button class="btn-back" onclick="navigate('index.html')">← Back</button>
    </div>
</div>

<!-- Full notifications page -->
<div class="notif-page-wrapper">
    <div class="notif-page-header">
        <h3>🔔 Notifications</h3>
        <button class="mark-all-btn" onclick="markAllRead()">Mark all as read</button>
    </div>
    <div id="notifPageList">
        <div class="notif-loading">Loading notifications...</div>
    </div>
</div>

<script>
    const API   = "http://localhost:8080";
    const token = localStorage.getItem("token");
    const currentUserId = localStorage.getItem("userId");

    if (!token) { location.href = "login.html"; }

    function navigate(url) {
        sessionStorage.setItem('navigating', 'true');
        location.href = url;
    }

    const modeBtn = document.getElementById("modeBtn");
    if (localStorage.getItem("mode") === "dark") {
        document.body.classList.add("dark");
        modeBtn.innerText = "☀️";
    }
    function toggleMode() {
        document.body.classList.toggle("dark");
        const dark = document.body.classList.contains("dark");
        localStorage.setItem("mode", dark ? "dark" : "light");
        modeBtn.innerText = dark ? "☀️" : "🌙";
    }

    function authHeaders() {
        return { "Authorization": `Bearer ${token}`, "Content-Type": "application/json" };
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
    }

    function timeAgo(isoString) {
        if (!isoString) return '';
        const d = new Date(isoString);
        const diff = Math.floor((Date.now() - d) / 1000);
        if (diff < 60) return 'just now';
        if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
        if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
        return Math.floor(diff / 86400) + 'd ago';
    }

    // ── NOTIFICATION TYPE → ICON ──
    function notifIcon(type) {
        const icons = {
            'message':      '💬',
            'swap_request': '🔄',
            'swap_accepted':'✅',
            'swap_rejected':'❌',
            'session':      '📅',
            'like':         '❤️',
            'system':       '📢',
        };
        return icons[type] || '🔔';
    }

    // ── LOAD NOTIFICATIONS (full page) ──
    async function loadNotifications() {
        const list = document.getElementById("notifPageList");
        try {
            const res = await fetch(`${API}/api/notifications`, { headers: authHeaders() });

            if (res.status === 401 || res.status === 403) { navigate('login.html'); return; }

            if (!res.ok) {
                // Backend endpoint may not exist yet — show placeholder
                list.innerHTML = renderPlaceholders();
                return;
            }

            const notifications = await res.json();
            updateBellBadge(notifications);

            if (!notifications.length) {
                list.innerHTML = `
                    <div class="empty-notif">
                        <span>🔔</span>
                        <p>No notifications yet</p>
                    </div>`;
                return;
            }

            list.innerHTML = `<div class="notif-list">${
                notifications.map(n => `
                    <div class="notif-card ${n.read ? '' : 'unread'}"
                         onclick="handleNotifClick('${n.id}', '${n.type}', '${n.relatedId || ''}')">
                        <div class="notif-icon">${notifIcon(n.type)}</div>
                        <div class="notif-body">
                            <div class="notif-title">${escapeHtml(n.title || notifTitle(n.type))}</div>
                            <div class="notif-text">${escapeHtml(n.message || '')}</div>
                            <div class="notif-time">${timeAgo(n.createdAt)}</div>
                        </div>
                        ${!n.read ? '<div class="unread-dot"></div>' : ''}
                    </div>
                `).join('')
            }</div>`;

        } catch(e) {
            list.innerHTML = renderPlaceholders();
        }
    }

    function notifTitle(type) {
        const titles = {
            'message': 'New Message',
            'swap_request': 'Swap Request',
            'swap_accepted': 'Swap Accepted',
            'swap_rejected': 'Swap Rejected',
            'session': 'Session Update',
            'like': 'Someone liked your skill',
        };
        return titles[type] || 'Notification';
    }

    // ── PLACEHOLDER CARDS (if API not ready yet) ──
    function renderPlaceholders() {
        const samples = [
            { icon: '💬', title: 'New Message', text: 'WebSocket messages will appear here', unread: true },
            { icon: '🔄', title: 'Swap Request', text: 'Swap request notifications from Yousef\'s module', unread: true },
            { icon: '✅', title: 'Swap Accepted', text: 'Your swap request was accepted', unread: false },
        ];
        return `
            <div style="background:rgba(108,99,255,0.07); border-radius:10px; padding:12px 16px; margin-bottom:16px; font-size:0.8rem; color:var(--text-light);">
                ℹ️ Showing placeholder data — connect <code>/api/notifications</code> backend endpoint to see real notifications.
            </div>
            <div class="notif-list">
                ${samples.map(s => `
                    <div class="notif-card ${s.unread ? 'unread' : ''}">
                        <div class="notif-icon">${s.icon}</div>
                        <div class="notif-body">
                            <div class="notif-title">${s.title}</div>
                            <div class="notif-text">${s.text}</div>
                            <div class="notif-time">just now</div>
                        </div>
                        ${s.unread ? '<div class="unread-dot"></div>' : ''}
                    </div>
                `).join('')}
            </div>`;
    }

    // ── BELL DROPDOWN ──
    function toggleBellDropdown() {
        const dropdown = document.getElementById("bellDropdown");
        dropdown.classList.toggle("open");
        if (dropdown.classList.contains("open")) loadBellNotifs();
    }

    async function loadBellNotifs() {
        const bellList = document.getElementById("bellNotifList");
        try {
            const res = await fetch(`${API}/api/notifications`, { headers: authHeaders() });
            if (!res.ok) {
                bellList.innerHTML = `<div style="padding:16px;text-align:center;font-size:0.8rem;color:var(--text-light);">No notifications</div>`;
                return;
            }
            const notifications = await res.json();
            updateBellBadge(notifications);

            if (!notifications.length) {
                bellList.innerHTML = `<div style="padding:16px;text-align:center;font-size:0.8rem;color:var(--text-light);">All caught up! 🎉</div>`;
                return;
            }

            const top5 = notifications.slice(0, 5);
            bellList.innerHTML = top5.map(n => `
                <div class="bell-notif-item ${n.read ? '' : 'unread'}"
                     onclick="handleNotifClick('${n.id}', '${n.type}', '${n.relatedId || ''}')">
                    <span>${notifIcon(n.type)}</span>
                    <span class="bell-notif-msg">${escapeHtml(n.message || notifTitle(n.type))}</span>
                    <span class="bell-notif-time">${timeAgo(n.createdAt)}</span>
                </div>
            `).join('');

        } catch(e) {
            bellList.innerHTML = `<div style="padding:16px;text-align:center;font-size:0.8rem;color:var(--text-light);">Could not load</div>`;
        }
    }

    function updateBellBadge(notifications) {
        const badge = document.getElementById("bellBadge");
        if (!badge) return;
        const unread = notifications.filter(n => !n.read).length;
        if (unread > 0) {
            badge.textContent = unread > 99 ? '99+' : unread;
            badge.style.display = 'flex';
        } else {
            badge.style.display = 'none';
        }
    }

    // ── HANDLE CLICK ON A NOTIFICATION ──
    async function handleNotifClick(notifId, type, relatedId) {
        // Mark as read
        try {
            await fetch(`${API}/api/notifications/${notifId}/read`, {
                method: 'PUT',
                headers: authHeaders()
            });
        } catch(e) { /* ignore if endpoint doesn't exist */ }


        if (type === 'message' && relatedId) {
            navigate(`chat.html?userId=${relatedId}`);
        } else if ((type === 'swap_request' || type === 'swap_accepted') && relatedId) {
            navigate(`index.html`);
        }
    }


    async function markAllRead() {
        try {
            await fetch(`${API}/api/notifications/read-all`, {
                method: 'PUT',
                headers: authHeaders()
            });
            loadNotifications();
        } catch(e) {

            loadNotifications();
        }
    }


    document.addEventListener('click', function(e) {
        const wrapper = document.getElementById('bellWrapper');
        if (wrapper && !wrapper.contains(e.target)) {
            document.getElementById('bellDropdown').classList.remove('open');
        }
    });


    window.addEventListener('beforeunload', () => {
        const navigating = sessionStorage.getItem('navigating');
        if (currentUserId && !navigating) {
            navigator.sendBeacon(`${API}/presence/offline/${currentUserId}`);
        }
        sessionStorage.removeItem('navigating');
    });


    loadNotifications();
</script>
<script src="main.js"></script>
</body>
</html>
