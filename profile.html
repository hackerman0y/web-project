<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Profile</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="navbar">
    <h2 onclick="navigate('index.html')">My Profile</h2>
    <div class="nav-right">
        <button class="mode-btn" id="modeBtn" onclick="toggleMode()">🌙</button>
        <button class="btn-back" onclick="navigate('index.html')">← Back</button>
    </div>
</div>

<div class="profile-container">
    <div class="avatar">👤</div>
    <h2 id="username">Loading...</h2>
    <p id="email" class="email-text"></p>
    <p id="status" class="status-text"></p>
    <div id="skillsList" class="skills-list"></div>
    <br>
    <button class="btn-logout" onclick="logout()">🚪 Logout</button>
</div>

<script>
    const API = "http://localhost:8080";

    const token = localStorage.getItem("token");
    const userId = localStorage.getItem("userId");
    if (!token) location.href = "login.html";

    // ✅ Navigate without triggering offline
    function navigate(url) {
        sessionStorage.setItem('navigating', 'true');
        location.href = url;
    }

    // dark mode
    const modeBtn = document.getElementById("modeBtn");
    if (localStorage.getItem("mode") === "dark") {
        document.body.classList.add("dark");
        modeBtn.innerText = "☀️";
    }
    function toggleMode() {
        document.body.classList.toggle("dark");
        const dark = document.body.classList.contains("dark");
        localStorage.setItem("mode", dark ? "dark" : "light");
        modeBtn.innerText = dark ? "☀️" : "🌙";
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m =>
            m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;'
        );
    }

    function authHeaders() {
        return {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${token}`
        };
    }

    // ✅ Only set offline if actually closing browser, not navigating
    window.addEventListener('beforeunload', () => {
        const navigating = sessionStorage.getItem('navigating');
        if (userId && !navigating) {
            navigator.sendBeacon(`${API}/presence/offline/${userId}`);
        }
        sessionStorage.removeItem('navigating');
    });

    async function loadProfile() {
        try {
            // ✅ Set online when profile loads
            await fetch(`${API}/presence/online`, {
                method: 'POST',
                headers: authHeaders()
            });

            const userRes = await fetch(`${API}/api/users/me`, {
                headers: authHeaders()
            });

            if (!userRes.ok) {
                navigate('login.html');
                return;
            }

            const user = await userRes.json();

            document.getElementById("username").innerText = user.username || "No name";
            document.getElementById("email").innerText = user.email || "";
            document.getElementById("status").innerHTML =
                user.online ? "🟢 Online" : "⚫ Offline";

            const skillsRes = await fetch(`${API}/api/skills/user/${user.id}`, {
                headers: authHeaders()
            });

            if (!skillsRes.ok) throw new Error();

            const skills = await skillsRes.json();
            const list = document.getElementById("skillsList");

            if (!skills.length) {
                list.innerHTML = "<p class='no-skills'>No skills yet</p>";
                return;
            }

            list.innerHTML =
                "<h3>My Skills</h3>" +
                skills.map(s => `
                <div class="skill-item">
                    <b>${escapeHtml(s.name)}</b> — ${escapeHtml(s.category || "")}
                    <span class="skill-type-badge ${s.type === 'teach' ? 'badge-teach' : 'badge-learn'}">
                        ${s.type}
                    </span>
                    <p>${escapeHtml(s.description || "")}</p>
                    <small>🔥 ${s.popularity || 0}</small>
                </div>
            `).join("");

        } catch (e) {
            document.getElementById("skillsList").innerHTML =
                "<p>Could not load skills</p>";
        }
    }

    async function logout() {
        // ✅ Set offline on logout explicitly
        if (userId) {
            navigator.sendBeacon(`${API}/presence/offline/${userId}`);
        }
        try {
            await fetch(`${API}/api/users/logout`, {
                method: "POST",
                headers: authHeaders()
            });
        } catch (_) {}

        localStorage.clear();
        location.href = "login.html";
    }

    loadProfile();
</script>
<script src="main.js"></script>
</body>
</html>
