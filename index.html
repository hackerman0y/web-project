<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>🔄SkillSwap</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="navbar">
    <h2 class="logo" onclick="navigate('index.html')">
        <span class="logo-icon">🔄</span>
        <span class="logo-text">SkillSwap</span>
    </h2>
    <div class="nav-right">
        <div class="coin-nav-badge" onclick="navigate('Store.html')" style="cursor:pointer; display:flex; align-items:center; gap:6px; background:linear-gradient(135deg,#f59e0b,#d97706); color:white; padding:6px 14px; border-radius:20px; font-size:0.82rem; font-weight:700;">
            🪙 <span id="navCoinCount">0</span>
        </div>
        <span onclick="navigate('about.html')" style="cursor:pointer; font-size:0.85rem; font-weight:600; color:var(--text-light);" title="About Us">About</span>
        <span onclick="navigate('contact.html')" style="cursor:pointer; font-size:0.85rem; font-weight:600; color:var(--text-light);" title="Contact Us">Contact</span>
        <span onclick="navigate('chat-list.html')" style="cursor:pointer;" title="Messages">💬</span>
        <span onclick="navigate('notifications.html')" style="cursor:pointer;" title="Notifications">🔔</span>
        <span onclick="toggleFilters()" style="cursor:pointer;">⚙️</span>
        <div id="filtersBox" class="filters-box">
            <select id="catFilter">
                <option value="">All</option>
                <option>Programming</option>
                <option>Design</option>
                <option>Business</option>
                <option>Language</option>
                <option>Fitness</option>
            </select>
            <select id="sortFilter">
                <option value="">Sort</option>
                <option value="az">A-Z</option>
                <option value="za">Z-A</option>
                <option value="pop">🔥 Popular</option>
            </select>
        </div>
        <span id="navUser"></span>
        <span onclick="navigate('profile.html')" style="cursor:pointer;">👤</span>
        <button class="mode-btn" id="modeBtn" onclick="toggleMode()">🌙</button>
    </div>
</div>

<div class="controls">
    <input type="text" id="searchInput" class="search-input" placeholder="🔍 Search skill...">
    <button class="add-btn" onclick="openModal()">+ Add</button>
</div>

<div class="skills-grid" id="skillsContainer"></div>

<div class="modal" id="modal">
    <div class="modal-content">
        <h3>✨ New Skill</h3>
        <input id="name" placeholder="Skill name">
        <select id="cat">
            <option value="">Category</option>
            <option>Programming</option>
            <option>Design</option>
            <option>Business</option>
            <option>Language</option>
            <option>Fitness</option>
            <option value="Other">Other</option>
        </select>
        <input id="otherCategory" placeholder="Custom category" style="display:none;">
        <textarea id="desc" rows="2" placeholder="Description (optional)"></textarea>
        <select id="type">
            <option value="teach">📖 Teach</option>
            <option value="learn">📚 Learn</option>
        </select>
        <div class="modal-buttons">
            <button class="cancel-btn" onclick="resetForm()">Cancel</button>
            <button class="submit-btn" id="addBtn" onclick="addSkill()">Save</button>
        </div>
    </div>
</div>

<script>
    const API = "http://localhost:8080";

    function navigate(url) {
        sessionStorage.setItem('navigating', 'true');
        location.href = url;
    }

    const modeBtn = document.getElementById("modeBtn");
    if (localStorage.getItem("mode") === "dark") {
        document.body.classList.add("dark");
        modeBtn.innerText = "☀️";
    }
    function toggleMode() {
        document.body.classList.toggle("dark");
        const dark = document.body.classList.contains("dark");
        localStorage.setItem("mode", dark ? "dark" : "light");
        modeBtn.innerText = dark ? "☀️" : "🌙";
    }

    const modal         = document.getElementById("modal");
    const search        = document.getElementById("searchInput");
    const catFilter     = document.getElementById("catFilter");
    const sortFilter    = document.getElementById("sortFilter");
    const filtersBox    = document.getElementById("filtersBox");
    const nameInput     = document.getElementById("name");
    const cat           = document.getElementById("cat");
    const desc          = document.getElementById("desc");
    const type          = document.getElementById("type");
    const otherCategory = document.getElementById("otherCategory");

    let allSkills  = [];
    let editingId  = null;

    function getToken()      { return localStorage.getItem("token"); }
    function getCurrentUser() {
        const userId   = localStorage.getItem("userId");
        const username = localStorage.getItem("username");
        if (!userId) return null;
        return { id: parseInt(userId), username };
    }
    function authHeaders() {
        return {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${getToken()}`
        };
    }
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
    }
    function handleUnauthorized(res) {
        if (res.status === 401 || res.status === 403) {
            alert("Session expired. Please login again.");
            localStorage.removeItem("token");
            localStorage.removeItem("userId");
            localStorage.removeItem("username");
            location.href = "login.html";
            return true;
        }
        return false;
    }

    document.addEventListener('DOMContentLoaded', () => {
        sessionStorage.removeItem('navigating');
        loadSkills();
        loadUser();
    });

    window.addEventListener('beforeunload', () => {
        const userId     = localStorage.getItem('userId');
        const navigating = sessionStorage.getItem('navigating');
        if (userId && !navigating) {
            navigator.sendBeacon(`${API}/presence/offline/${userId}`);
        }
    });

    async function loadSkills() {
        try {
            const res = await fetch(`${API}/api/skills`);
            if (!res.ok) throw new Error();
            allSkills = await res.json();
            updateDisplay();
        } catch (e) {
            document.getElementById("skillsContainer").innerHTML =
                `<div class="empty-state">⚠️ Could not load skills. Is the server running?</div>`;
        }
    }

    function updateDisplay() {
        let filtered = [...allSkills];
        const q = search.value.toLowerCase();
        if (q) filtered = filtered.filter(x => x.name.toLowerCase().includes(q));
        if (catFilter.value) {
            filtered = filtered.filter(x =>
                x.category?.toLowerCase() === catFilter.value.toLowerCase());
        }
        if (sortFilter.value === "az") filtered.sort((a, b) => a.name.localeCompare(b.name));
        if (sortFilter.value === "za") filtered.sort((a, b) => b.name.localeCompare(a.name));
        if (sortFilter.value === "pop") filtered.sort((a, b) => (b.popularity || 0) - (a.popularity || 0));
        displaySkills(filtered);
    }

    function displaySkills(skills) {
        const container = document.getElementById("skillsContainer");
        if (!skills.length) {
            container.innerHTML = `<div class="empty-state">✨ No skills found. Add one!</div>`;
            return;
        }
        const currentUser = getCurrentUser();
        container.innerHTML = skills.map(skill => {
            const user     = skill.user || {};
            const username = user.username || "Unknown";
            const isOwner  = currentUser && (skill.user?.id === currentUser.id);
            return `
            <div class="skill-card" onclick="navigate('details.html?id=${skill.id}')">
                <div class="skill-name">${escapeHtml(skill.name)}</div>
                <div class="skill-category">#${escapeHtml(skill.category || "General")}</div>
                ${skill.description
                ? `<div class="skill-description">${escapeHtml(skill.description)}</div>`
                : ''}
                <div class="user-row">
                    <div class="user-info">
                        <div class="user-avatar">${(username.charAt(0) || "U").toUpperCase()}</div>
                        <div>
                            <div class="user-name">${escapeHtml(username)}</div>
                            <div>
                                <span class="online-dot ${user.online ? 'online' : 'offline'}"></span>
                                <span style="font-size:0.65rem;">${user.online ? 'Online' : 'Offline'}</span>
                            </div>
                        </div>
                    </div>
                    <div class="type-badge ${skill.type === 'teach' ? 'type-teach' : 'type-learn'}">
                        ${skill.type === 'teach' ? 'TEACH' : 'LEARN'}
                    </div>
                </div>
                <div class="card-footer">
                    <div class="popularity">🔥 ${skill.popularity || 0}</div>
                    <div class="action-group">
                        <button class="action-btn"
                            onclick="event.stopPropagation(); increasePopularity(${skill.id})">❤️</button>
                        ${isOwner ? `
                        <button class="action-btn"
                            onclick="event.stopPropagation(); editSkill(${skill.id})">✏️</button>
                        <button class="action-btn"
                            onclick="event.stopPropagation(); deleteSkill(${skill.id})">🗑️</button>
                        ` : ''}
                    </div>
                </div>
            </div>`;
        }).join('');
    }

    async function addSkill() {
        const currentUser = getCurrentUser();
        if (!currentUser) { location.href = "login.html"; return; }

        const categoryValue = cat.value === "Other"
            ? otherCategory.value.trim()
            : cat.value;
        if (!nameInput.value.trim()) { alert("Enter skill name"); return; }

        const skill = {
            name:        nameInput.value.trim(),
            category:    categoryValue,
            description: desc.value.trim(),
            type:        type.value
        };

        const btn = document.getElementById("addBtn");
        btn.disabled  = true;
        btn.innerText = "Saving...";

        try {
            const url    = editingId ? `${API}/api/skills/${editingId}` : `${API}/api/skills`;
            const method = editingId ? "PUT" : "POST";

            const res = await fetch(url, {
                method,
                headers: authHeaders(),
                body: JSON.stringify(skill)
            });

            if (handleUnauthorized(res)) return;
            if (!res.ok) { alert("Could not save skill"); return; }

            resetForm();
            await loadSkills();
        } catch (e) {
            alert("Connection error. Is the server running?");
        } finally {
            btn.disabled  = false;
            btn.innerText = "Save";
        }
    }

    async function deleteSkill(id) {
        if (!getCurrentUser()) { location.href = "login.html"; return; }
        if (!confirm("Delete this skill?")) return;
        try {
            const res = await fetch(`${API}/api/skills/${id}`, {
                method: "DELETE",
                headers: authHeaders()
            });
            if (handleUnauthorized(res)) return;
            if (!res.ok) { alert("Could not delete skill"); return; }
            await loadSkills();
        } catch (e) {
            alert("Connection error.");
        }
    }

    function editSkill(id) {
        if (!getCurrentUser()) { location.href = "login.html"; return; }
        const skill = allSkills.find(s => s.id === id);
        if (!skill) return;

        nameInput.value = skill.name;
        cat.value       = skill.category || "";
        desc.value      = skill.description || "";
        type.value      = skill.type || "teach";

        if (cat.value === "Other") {
            otherCategory.style.display = "block";
            otherCategory.value = skill.category || "";
        }
        editingId = id;
        modal.style.display = "flex";
    }

    async function increasePopularity(id) {
        if (!getCurrentUser()) {
            alert("Please login to like!");
            location.href = "login.html";
            return;
        }
        try {
            const res = await fetch(`${API}/api/skills/${id}/increase`, {
                method: "PUT",
                headers: authHeaders()
            });
            if (handleUnauthorized(res)) return;
            if (res.ok) await loadSkills();
        } catch (e) {
            console.error("Like failed", e);
        }
    }

    function openModal() {
        if (!getCurrentUser()) {
            alert("Please login first!");
            location.href = "login.html";
            return;
        }
        resetForm();
        modal.style.display = "flex";
    }

    function resetForm() {
        modal.style.display = "none";
        editingId           = null;
        nameInput.value     = "";
        cat.value           = "";
        desc.value          = "";
        type.value          = "teach";
        otherCategory.value = "";
        otherCategory.style.display = "none";
    }

    function toggleFilters() {
        filtersBox.style.display =
            filtersBox.style.display === "flex" ? "none" : "flex";
    }

    cat.onchange = () => {
        otherCategory.style.display = cat.value === "Other" ? "block" : "none";
    };

    function loadUser() {
        const username = localStorage.getItem("username");
        if (!username) {
            document.getElementById("navUser").innerHTML =
                `<button class="btn" onclick="navigate('login.html')">🔐 Login</button>`;
        } else {
            document.getElementById("navUser").innerHTML =
                `<span style="color:var(--primary); font-weight:bold; cursor:pointer;"
                       onclick="logout()">👋 ${escapeHtml(username)} (logout)</span>`;
        }
    }

    async function logout() {
        const userId = localStorage.getItem('userId');
        if (userId) navigator.sendBeacon(`${API}/presence/offline/${userId}`);
        try {
            await fetch(`${API}/api/users/logout`, { method: "POST", headers: authHeaders() });
        } catch (_) {}
        localStorage.removeItem("token");
        localStorage.removeItem("userId");
        localStorage.removeItem("username");
        localStorage.removeItem("email");
        location.href = "login.html";
    }

    search.oninput      = updateDisplay;
    catFilter.onchange  = updateDisplay;
    sortFilter.onchange = updateDisplay;

    loadSkills();
    loadUser();
    async function loadNavCoins() {
        const t = localStorage.getItem("token");
        if (!t) return;
        try {
            const res = await fetch(`${API}/api/coins/balance`, {
                headers: { "Authorization": `Bearer ${t}` }
            });
            if (!res.ok) return;
            const data = await res.json();
            const el = document.getElementById("navCoinCount");
            if (el) el.textContent = data.balance;
        } catch(e) {}
    }
    loadNavCoins();
</script>
<script src="main.js"></script>
</body>
</html>
