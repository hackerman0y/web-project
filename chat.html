<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkillSwap - Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
    :root {
        --primary: #6c63ff;
        --primary-light: #8b83ff;
        --bg: #f0f2ff;
        --card: #ffffff;
        --border: #e4e6f0;
        --text: #1a1a2e;
        --text-light: #7b7fa8;
        --success: #10b981;
        --danger: #ef4444;
    }
    body.dark {
        --bg: #0f0f1a;
        --card: #1a1a2e;
        --border: #2a2a45;
        --text: #e8e8f5;
        --text-light: #6b6b9a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
        font-family: 'Sora', sans-serif;
        display: flex;
        flex-direction: column;
        height: 100vh;
        overflow: hidden;
        background: var(--bg);
        color: var(--text);
        transition: background 0.3s, color 0.3s;
    }

    /* HEADER */
    .chat-header {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 18px;
        background: var(--card);
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
        box-shadow: 0 2px 12px rgba(108,99,255,0.07);
    }
    .back-btn {
        background: var(--bg);
        border: 1.5px solid var(--border);
        color: var(--primary);
        width: 36px; height: 36px;
        border-radius: 10px;
        font-size: 1.1rem;
        cursor: pointer;
        display: flex; align-items: center; justify-content: center;
        transition: all 0.15s;
        flex-shrink: 0;
    }
    .back-btn:hover { background: var(--primary); color: white; border-color: var(--primary); }

    .recipient-avatar {
        width: 42px; height: 42px;
        border-radius: 13px;
        display: flex; align-items: center; justify-content: center;
        color: white; font-weight: 700; font-size: 1rem;
        position: relative; flex-shrink: 0;
    }
    .recipient-dot {
        position: absolute;
        bottom: -2px; right: -2px;
        width: 12px; height: 12px;
        border-radius: 50%;
        border: 2px solid var(--card);
        background: #64748b;
    }
    .recipient-dot.on { background: var(--success); }

    .recipient-info { flex: 1; }
    .recipient-name { font-weight: 600; font-size: 0.92rem; color: var(--text); }
    .recipient-status { font-size: 0.72rem; color: var(--text-light); margin-top: 1px; }

    .mode-btn {
        background: var(--bg);
        border: 1.5px solid var(--border);
        color: var(--text-light);
        padding: 6px 10px;
        border-radius: 10px;
        cursor: pointer;
        font-size: 13px;
        font-family: inherit;
        transition: all 0.2s;
        flex-shrink: 0;
    }
    .mode-btn:hover { border-color: var(--primary); color: var(--primary); }

    /* MESSAGES AREA */
    .messages-area {
        flex: 1;
        overflow-y: auto;
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 4px;
        background: var(--bg);
    }
    .messages-area::-webkit-scrollbar { width: 4px; }
    .messages-area::-webkit-scrollbar-track { background: transparent; }
    .messages-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* DATE SEPARATOR */
    .date-sep {
        text-align: center;
        font-size: 0.7rem;
        color: var(--text-light);
        margin: 10px 0;
        position: relative;
    }
    .date-sep::before, .date-sep::after {
        content: '';
        position: absolute;
        top: 50%; width: 36%;
        height: 1px;
        background: var(--border);
    }
    .date-sep::before { left: 0; }
    .date-sep::after  { right: 0; }

    /* MESSAGE ROW */
    .message-row { display: flex; flex-direction: column; margin: 2px 0; }
    .message-row.sent  { align-items: flex-end; }
    .message-row.received { align-items: flex-start; }

    .bubble {
        max-width: 70%;
        padding: 10px 14px;
        border-radius: 18px;
        font-size: 0.875rem;
        line-height: 1.5;
        word-break: break-word;
    }
    .sent .bubble {
        background: var(--primary);
        color: white;
        border-bottom-right-radius: 5px;
    }
    .received .bubble {
        background: var(--card);
        color: var(--text);
        border: 1px solid var(--border);
        border-bottom-left-radius: 5px;
    }
    .bubble-meta {
        font-size: 0.63rem;
        color: var(--text-light);
        margin-top: 3px;
        padding: 0 4px;
    }

    /* TYPING INDICATOR */
    .typing-indicator {
        display: none;
        align-items: flex-start;
        gap: 8px;
        padding: 2px 0;
    }
    .typing-indicator.visible { display: flex; }
    .typing-dots {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 18px;
        border-bottom-left-radius: 5px;
        padding: 11px 16px;
        display: flex; gap: 4px; align-items: center;
    }
    .dot {
        width: 7px; height: 7px;
        background: var(--text-light); border-radius: 50%;
        animation: bounce 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
        0%, 60%, 100% { transform: translateY(0); }
        30% { transform: translateY(-6px); }
    }

    /* EMPTY STATE */
    .empty-messages {
        flex: 1; display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        color: var(--text-light); gap: 10px; text-align: center;
        padding: 40px;
    }
    .empty-messages span { font-size: 3rem; }
    .empty-messages p { font-size: 0.85rem; }

    /* INPUT BAR */
    .input-bar {
        display: flex;
        align-items: flex-end;
        gap: 10px;
        padding: 12px 16px;
        background: var(--card);
        border-top: 1px solid var(--border);
        flex-shrink: 0;
    }
    .msg-input {
        flex: 1;
        padding: 10px 16px;
        border: 1.5px solid var(--border);
        border-radius: 22px;
        background: var(--bg);
        color: var(--text);
        font-size: 0.875rem;
        outline: none;
        transition: border-color 0.2s;
        resize: none;
        font-family: inherit;
        max-height: 100px;
        line-height: 1.45;
    }
    .msg-input:focus { border-color: var(--primary); }
    .msg-input::placeholder { color: var(--text-light); }

    .send-btn {
        width: 44px; height: 44px;
        border-radius: 50%;
        background: var(--primary);
        border: none;
        cursor: pointer;
        display: flex; align-items: center; justify-content: center;
        font-size: 1.1rem;
        flex-shrink: 0;
        transition: opacity 0.2s, transform 0.1s;
        color: white;
    }
    .send-btn:hover { opacity: 0.88; transform: scale(1.06); }
    .send-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

    /* Avatar colors */
    .c1 { background: linear-gradient(135deg, #6c63ff, #8b5cf6); }
    .c2 { background: linear-gradient(135deg, #10b981, #059669); }
    .c3 { background: linear-gradient(135deg, #f59e0b, #d97706); }
    .c4 { background: linear-gradient(135deg, #ef4444, #dc2626); }
    .c5 { background: linear-gradient(135deg, #3b82f6, #2563eb); }
    .c6 { background: linear-gradient(135deg, #ec4899, #db2777); }
</style>
</head>
<body>

<div class="chat-header">
    <button class="back-btn" onclick="location.href='chat-list.html'">←</button>
    <div class="recipient-avatar" id="recipientAvatar">
        <div class="recipient-dot" id="recipientDot"></div>
    </div>
    <div class="recipient-info">
        <div class="recipient-name" id="recipientName">Loading...</div>
        <div class="recipient-status" id="recipientStatus">...</div>
    </div>
    <button class="mode-btn" id="modeBtn" onclick="toggleMode()">🌙</button>
</div>

<div class="messages-area" id="messagesArea">
    <div class="empty-messages" id="emptyState">
        <span>👋</span>
        <p>Say hello!</p>
    </div>
    <div class="typing-indicator" id="typingIndicator">
        <div class="typing-dots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
    </div>
</div>

<div class="input-bar">
    <textarea class="msg-input" id="msgInput"
              placeholder="Type a message..."
              rows="1" maxlength="1000"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
</div>

<script>
const API = "http://localhost/web/api";
const token = localStorage.getItem("token");
const currentUserId = localStorage.getItem("userId");

if (!token) location.href = "login.html";

const params = new URLSearchParams(window.location.search);
const recipientId = params.get("userId");
const recipientUsername = params.get("username") || "User";

// Dark mode
const modeBtn = document.getElementById("modeBtn");
if (localStorage.getItem("mode") === "dark") {
    document.body.classList.add("dark");
    modeBtn.textContent = "☀️";
}
function toggleMode() {
    document.body.classList.toggle("dark");
    const dark = document.body.classList.contains("dark");
    localStorage.setItem("mode", dark ? "dark" : "light");
    modeBtn.textContent = dark ? "☀️" : "🌙";
}

// Avatar setup
const colors = ['c1','c2','c3','c4','c5','c6'];
function avatarColor(username) {
    let h = 0;
    for (let c of (username||'')) h += c.charCodeAt(0);
    return colors[h % colors.length];
}

const recipientAvatarEl = document.getElementById("recipientAvatar");
const dotEl = document.getElementById("recipientDot");
recipientAvatarEl.className = `recipient-avatar ${avatarColor(recipientUsername)}`;
recipientAvatarEl.textContent = (recipientUsername.charAt(0)||'U').toUpperCase();
recipientAvatarEl.appendChild(dotEl);
document.getElementById("recipientName").textContent = recipientUsername;
document.getElementById("recipientStatus").textContent = "...";

function authHeaders() {
    return {
        "Authorization": "Bearer " + token,
        "Content-Type": "application/json",
        "X-Token": token
    };
}

function escHtml(s) {
    return (s||'').replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;');
}

function formatTime(ts) {
    if (!ts) return '';
    return new Date(ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

const messagesArea = document.getElementById("messagesArea");
const emptyState   = document.getElementById("emptyState");
const typingIndicator = document.getElementById("typingIndicator");

let lastMessageId = 0;
let rendered = false;

function renderMessage(msg, type) {
    if (!rendered) {
        emptyState.style.display = 'none';
        rendered = true;
    }

    const row = document.createElement('div');
    row.className = `message-row ${type}`;

    const content = escHtml(msg.message || msg.content || '');
    const time = formatTime(msg.created_at || msg.time);
    const seen = msg.seen == 1 ? ' ✔✔' : ' ✔';

    row.innerHTML = `
        <div class="bubble">${content}</div>
        <div class="bubble-meta">${time}${type === 'sent' ? seen : ''}</div>
    `;

    messagesArea.insertBefore(row, typingIndicator);
    messagesArea.scrollTop = messagesArea.scrollHeight;
}

async function loadMessages() {
    try {
        const res = await fetch(`${API}/messages.php?action=history&with=${recipientId}&token=${token}`);
        const data = await res.json();
        if (!Array.isArray(data)) return;
        data.forEach(msg => {
            if (msg.id > lastMessageId) {
                const isMine = String(msg.from_user_id) === String(currentUserId);
                renderMessage(msg, isMine ? 'sent' : 'received');
                lastMessageId = msg.id;
            }
        });
    } catch(e) { console.error("Load error", e); }
}

async function markSeen() {
    try {
        await fetch(`${API}/messages.php?action=seen&with=${recipientId}&token=${token}`);
    } catch(e) {}
}

async function sendMessage() {
    const input = document.getElementById("msgInput");
    const content = input.value.trim();
    if (!content) return;

    try {
        const res = await fetch(`${API}/messages.php?action=send&token=${token}`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ to_user_id: recipientId, message: content })
        });
        const data = await res.json();
        if (data.success) {
            renderMessage({ message: content, created_at: new Date().toISOString(), seen: 0, from_user_id: currentUserId }, 'sent');
            if (data.id) lastMessageId = Math.max(lastMessageId, data.id);
            input.value = '';
            input.style.height = 'auto';
        }
    } catch(e) { console.error("Send error", e); }
}

// Auto-resize textarea
const msgInput = document.getElementById("msgInput");
msgInput.addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 100) + 'px';
});

msgInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
    }
});

// Polling every 2 seconds
setInterval(() => {
    loadMessages();
    markSeen();
}, 2000);

// Initial load
loadMessages();
markSeen();
</script>
</body>
</html>
