<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillSwap - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="navbar-root"></div>

<div class="center">
    <div class="login-card">
        <h2>👋 Welcome</h2>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('login')">Login</button>
            <button class="tab" onclick="switchTab('register')">Register</button>
        </div>

        <div id="login-form" style="display:flex;flex-direction:column;gap:12px;">
            <input type="email" id="l-email" placeholder="Email address">
            <input type="password" id="l-pass" placeholder="Password">
            <div class="error-msg" id="login-error"></div>
            <div class="success-msg" id="login-success"></div>
            <button class="btn-main" id="login-btn" onclick="doLogin()">Login</button>
        </div>

        <div id="register-form" style="display:none;flex-direction:column;gap:12px;">
            <input type="text" id="r-username" placeholder="Username">
            <input type="email" id="r-email" placeholder="Email address">
            <input type="password" id="r-pass" placeholder="Password">
            <div class="error-msg" id="register-error"></div>
            <div class="success-msg" id="register-success"></div>
            <button class="btn-main" id="register-btn" onclick="doRegister()">Create Account</button>
        </div>

        <div class="divider">— or —</div>
        <button class="btn-back" onclick="navigate('index.html')">Browse Skills Without Login</button>
    </div>
</div>

<footer>SkillSwap &copy; 2025 — Trade skills, not money 💜</footer>

<script src="nav.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", () => {
        sessionStorage.removeItem("navigating");
        initNav("");
    });

    function switchTab(tab) {
        document.querySelectorAll(".tab").forEach((t, i) => {
            t.classList.toggle("active", (i === 0 && tab === "login") || (i === 1 && tab === "register"));
        });
        document.getElementById("login-form").style.display    = tab === "login"    ? "flex" : "none";
        document.getElementById("register-form").style.display = tab === "register" ? "flex" : "none";
    }

    function showMsg(id, text, type) {
        const el = document.getElementById(id);
        el.textContent = text;
        el.className = type === "error" ? "error-msg" : "success-msg";
        el.style.display = "block";
    }
    function hideMsg(id) { document.getElementById(id).style.display = "none"; }

    async function doLogin() {
        const email    = document.getElementById("l-email").value.trim();
        const password = document.getElementById("l-pass").value;
        hideMsg("login-error");
        hideMsg("login-success");

        if (!email || !password) return showMsg("login-error", "❌ Please fill in all fields", "error");

        const btn = document.getElementById("login-btn");
        btn.disabled = true;
        btn.textContent = "Logging in...";

        try {
            const res = await fetch("Users.php?action=login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email, password })
            });

            if (res.ok) {
                const data = await res.json();
                // PHP uses sessions, store basic info for frontend use
                localStorage.setItem("token",    "php-session");
                localStorage.setItem("userId",   data.userId);
                localStorage.setItem("username", data.username);

                showMsg("login-success", "✅ Login successful! Redirecting...", "success");
                setTimeout(() => navigate("index.html"), 1500);
            } else {
                showMsg("login-error", "❌ Wrong email or password", "error");
            }
        } catch(e) {
            showMsg("login-error", "❌ Cannot connect to server", "error");
        }

        btn.disabled = false;
        btn.textContent = "Login";
    }

    async function doRegister() {
        const username = document.getElementById("r-username").value.trim();
        const email    = document.getElementById("r-email").value.trim();
        const password = document.getElementById("r-pass").value;
        hideMsg("register-error");
        hideMsg("register-success");

        if (!username || !email || !password)
            return showMsg("register-error", "❌ Please fill in all fields", "error");

        const btn = document.getElementById("register-btn");
        btn.disabled = true;
        btn.textContent = "Creating account...";

        try {
            const res = await fetch("Users.php?action=register", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ username, email, password })
            });

            if (res.ok) {
                showMsg("register-success", "✅ Account created! Please login.", "success");
                setTimeout(() => {
                    switchTab("login");
                    document.getElementById("l-email").value = email;
                }, 1500);
            } else {
                const data = await res.json().catch(() => ({}));
                showMsg("register-error", "❌ " + (data.error || "Registration failed"), "error");
            }
        } catch(e) {
            showMsg("register-error", "❌ Cannot connect to server", "error");
        }

        btn.disabled = false;
        btn.textContent = "Create Account";
    }

    document.addEventListener("keypress", e => {
        if (e.key !== "Enter") return;
        const loginVisible = document.getElementById("login-form").style.display !== "none";
        loginVisible ? doLogin() : doRegister();
    });
</script>
</body>
</html>
